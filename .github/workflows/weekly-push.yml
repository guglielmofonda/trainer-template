name: Weekly advance & push

# Sunday night: read last week's Hevy training, run the progression engine to
# advance the program (source of truth), and push next week's routines to Hevy.
# Guards: holds if you didn't train last week; stops at the end of a block.
# Needs HEVY_API_KEY. BLOB_READ_WRITE_TOKEN is optional; without it the job uses
# the repository's data/store.json snapshot. Runs from the default branch.

on:
  schedule:
    - cron: "0 4 * * 1" # Mon 04:00 UTC ≈ Sun 8–9pm PT
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: trainer-repo-write # shared with the daily Action so the two never push to main at once
  cancel-in-progress: false

jobs:
  gate:
    # A fresh copy of this template ships without secrets, and a scheduled run
    # without the key would fail red every week and email you. Probe the
    # secret here; the advance job runs only once HEVY_API_KEY is configured.
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.probe.outputs.ready }}
    steps:
      - name: Probe for HEVY_API_KEY
        id: probe
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
        run: |
          if [ -n "$HEVY_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HEVY_API_KEY is not configured — skipping. Add the secret (Settings → Secrets and variables → Actions) to enable the weekly advance."
          fi

  advance:
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Advance the plan & push next week
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: npm run weekly:advance -- --apply

      - name: Commit the advanced program (source of truth)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/store.json data/state.json
          if git diff --staged --quiet; then
            echo "No advance this week (held) — nothing to commit."
          else
            git commit -m "chore(weekly): advance program $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main || true
            git push
          fi

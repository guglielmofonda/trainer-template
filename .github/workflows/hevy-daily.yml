name: Hevy daily pull

# Pulls your recent Hevy workouts once a day, writes a Markdown summary to the run
# page, and commits the report plus machine-readable completion history so the
# app always has the latest read.
# Needs HEVY_API_KEY. BLOB_READ_WRITE_TOKEN is optional; without it the job uses
# the repository's data/store.json snapshot.
# Scheduled workflows only run from the default branch.

on:
  schedule:
    - cron: "0 0 * * *" # 00:00 UTC daily (~5pm PT) — after the morning session
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: trainer-repo-write # shared with the weekly Action so the two never push to main at once
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Pull Hevy summary
        env:
          HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: npm run hevy:daily

      - name: Commit the latest report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/hevy-latest.md data/hevy-history.json
          if git diff --staged --quiet; then
            echo "No change in the daily outputs."
          else
            git commit -m "chore(hevy): daily pull $(date -u +%Y-%m-%d)"
            if [ "$GITHUB_REF_NAME" = "main" ]; then
              git pull --rebase --autostash origin main
            fi
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
